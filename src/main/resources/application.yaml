server:
  port: ${LIBRARY_SERVER_PORT:8090}

spring:
  application:
    name: ${LIBRARY_APPLICATION_NAME:library-lending-service}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${LIBRARY_DB_URL:jdbc:postgresql://localhost:5545/library_lending_db}
    username: ${POSTGRES_LIBRARY_USER:library_user}
    password: ${POSTGRES_LIBRARY_PASSWORD:library_pass_2026}
    driver-class-name: ${LIBRARY_DB_DRIVER_CLASS_NAME:org.postgresql.Driver}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: ${LIBRARY_DB_SCHEMA:public}
        jdbc:
          time_zone: ${APP_TIMEZONE:UTC}

  liquibase:
    enabled: ${LIBRARY_LIQUIBASE_ENABLED:true}
    change-log: classpath:db/changelog/changelog-master.yaml
    default-schema: ${LIBRARY_DB_SCHEMA:public}
    liquibase-schema: ${LIBRARY_DB_SCHEMA:public}

  redis:
    host: ${LIBRARY_REDIS_HOST:localhost}
    port: ${LIBRARY_REDIS_PORT:6386}
    database: ${LIBRARY_REDIS_DB:0}
    timeout: ${LIBRARY_REDIS_TIMEOUT:2s}

app:
  pages:
    default-page-number: ${LIBRARY_DEFAULT_PAGE_NUMBER:0}
    default-page-size: ${LIBRARY_DEFAULT_PAGE_SIZE:10}
    max-page-size: ${LIBRARY_MAX_PAGE_SIZE:100}
  cache:
    books-ttl: ${LIBRARY_CACHE_BOOKS_TTL:45s}
    clients-ttl: ${LIBRARY_CACHE_CLIENTS_TTL:45s}
    lendings-ttl: ${LIBRARY_CACHE_LENDINGS_TTL:30s}
    book-key-prefix: ${LIBRARY_CACHE_BOOK_KEY_PREFIX:book:}
    client-key-prefix: ${LIBRARY_CACHE_CLIENT_KEY_PREFIX:client:}
    lending-key-prefix: ${LIBRARY_CACHE_LENDING_KEY_PREFIX:lending:}
    lending-by-client-key-prefix: ${LIBRARY_CACHE_LENDING_BY_CLIENT_KEY_PREFIX:lending:client:}
    lending-by-book-key-prefix: ${LIBRARY_CACHE_LENDING_BY_BOOK_KEY_PREFIX:lending:book:}
  search:
    empty-filter-value: ${LIBRARY_SEARCH_EMPTY_FILTER_VALUE:}
  rate-limit:
    enabled: ${LIBRARY_RATE_LIMIT_ENABLED:true}
    capacity: ${LIBRARY_RATE_LIMIT_CAPACITY:60}
    window: ${LIBRARY_RATE_LIMIT_WINDOW:1m}
    key-prefix: ${LIBRARY_RATE_LIMIT_KEY_PREFIX:rate-limit:}
  openapi:
    server-url: ${LIBRARY_OPENAPI_SERVER_URL:http://localhost:8090}

jwt:
  secret-key: ${JWT_SECRET_KEY:GRO16WVD3nAoqU1dqzcAVblU1m4p0oWpiyU-MSQ0i5XQoOcFuOowoPTMyAq9KigqcdFWXrvCv-MVSc-E1rycjw}
  lifetime: ${JWT_LIFETIME_MS:86400000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    url: /v3/api-docs
    display-request-duration: true
    operationsSorter: alpha
    tagsSorter: alpha
    docExpansion: none
    defaultModelsExpandDepth: 1
    filter: true
    try-it-out-enabled: true
